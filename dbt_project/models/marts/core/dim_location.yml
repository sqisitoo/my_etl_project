version: 2

models:
  - name: dim_location
    description: "Dimension table containing configured locations for air quality observations."

    columns:
      - name: location_id
        description: "Surrogate key uniquely identifying each configured location."
        tests:
          - unique
          - not_null

      - name: city_name
        description: "Name of the city where the location is situated."

      - name: latitude
        description: "Latitude coordinate of the location."

      - name: longitude
        description: "Longitude coordinate of the location."
