version: 2

models:
  - name: stg_internal__locations
    description: "Staging model for city location configuration."

    columns:
      - name: location_id
        description: "Surrogate key generated for each configured location."
        tests:
          - unique
          - not_null

      - name: city_name
        description: "City name from internal configuration."
        tests:
          - not_null

      - name: latitude
        description: "Latitude coordinate of the city in decimal degrees."
        tests:
          - not_null

      - name: longitude
        description: "Longitude coordinate of the city in decimal degrees."
        tests:
          - not_null