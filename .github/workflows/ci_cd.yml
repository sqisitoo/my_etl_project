name: CI/CD Pipeline

# TRIGGERS
# Define when this pipeline runs.
on:
  push:
    branches: ["main"]      # Run on pushes to main (CI + Delivery)
  pull_request:
    branches: ["main"]      # Run on PRs to main (CI only)
  workflow_dispatch:

# GLOBAL ENVIRONMENT VARIABLES
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Ensure these versions match local development setup
  PYTHON_VERSION: "3.10"
  AIRFLOW_VERSION: "3.1.6"
  AWS_REGION: "eu-north-1"
  ECR_REPOSITORY: "airflow-repo"

jobs:
  # JOB 1: INTEGRATION (CI)
  # Focus: Code quality, Static Analysis, Unit Testing.
  # Does NOT build the Docker image to save resources.
  integration:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # Setup Python environment on the runner directly
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip" # Caches pip dependencies automatically
      
      - name: Install Dependencies
        run: make install_deps
      
      # Create a dummy .env file
      # tests rely on loading env vars
      - name: Prepare Test Environment
        run: |
          cp .env.template .env

      - name: Run Linters (Ruff, MyPy)
        run: make lint
      
      - name: Run Unit Tests (Pytest)
        run: make test

  # JOB 2: DELIVERY (CD)
  # Focus: Build Artifact (Docker Image) and Push to Registry.
  # Condition: Runs only if 'integration' job passes.
  build-and-push:
    name: Build & Push Docker Image
    needs: integration
    if: github.event_name == "push" && github.ref == "refs/heads/main"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    outputs:
      image_uri: ${{ steps.set-uri.outputs.image_uri}}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Buildx is required for advanced caching features
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      # Automatically generate tags: 'latest' (for main) and 'sha-xyz' (for immutable versioning)
      - name: Extract Metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,format=short
            type=raw,value=latest
        
      - name: Build and Push Image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/airflow/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pass build arguments to ensure image matches config
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            AIRFLOW_VERSION=${{ env.AIRFLOW_VERSION }}
          # GitHub Actions Cache optimization
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Set Image URI output
        id: set-uri
        run: |
          IMAGE_URI=$(echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ steps.build-image.outputs.digest }}")
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
      
